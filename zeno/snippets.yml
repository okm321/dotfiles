snippets:
  - name: git status
    keyword: gs
    snippet: git status --short --branch

  - name: git add
    keyword: ga
    snippet: git add

  - name: git commit message
    keyword: gcim
    snippet: git commit -m '{{commit_message}}'

  - name: git push
    keyword: gP
    snippet: git push

  - name: git pull
    keyword: gp
    snippet: git pull

  - name: git checkout
    keyword: gco
    snippet: git checkout

  - name: git branch
    keyword: gb
    snippet: git branch

  - name: git diff
    keyword: gd
    snippet: git diff

  - name: git log oneline
    keyword: glo
    snippet: git log --oneline

