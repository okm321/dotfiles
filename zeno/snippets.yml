  - name: docker compose up
    keyword: dcu
    snippet: docker compose up -d

  - name: docker compose down
    keyword: dcd
    snippet: docker compose down

  - name: docker compose logs
    keyword: dcl
    snippet: docker compose logs -f

  - name: docker compose restart
    keyword: dcr
    snippet: docker compose restart

  - name: docker compose exec
    keyword: dce
    snippet: docker compose exec {{service}}

  - name: docker compose build
    keyword: dcb
    snippet: docker compose build

  - name: docker ps
    keyword: dps
